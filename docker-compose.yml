version: "3.9"
services:
  db:
    image: postgres:17
    container_name: nucleus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nucleus
      POSTGRES_USER: nucleus
      POSTGRES_PASSWORD: nucleus
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nucleus -d nucleus"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.19.0
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sql/migrations:/migrations:ro

  api:
    image: golang:1.23
    container_name: nucleus-api
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      HTTP_PORT: "8080"
      DATABASE_URL: postgres://nucleus:nucleus@db:5432/nucleus?sslmode=disable
    command: sh -c "go run ./cmd/api"
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - go_mod_cache:/go/pkg/mod

volumes:
  pg_data:
  go_mod_cache:
