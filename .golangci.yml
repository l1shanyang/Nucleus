version: "2"

run:
  go: "1.26"

linters:
  enable:
    - gocritic
    - misspell

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

  exclusions:
    generated: lax
    paths:
      - vendor
      - internal/db/sqlc

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - nucleus

  exclusions:
    generated: lax
    paths:
      - vendor
      - internal/db/sqlc

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
