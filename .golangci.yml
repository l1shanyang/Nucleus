version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes: nucleus

  exclusions:
    generated: lax

exclusions:
  paths:
    - vendor
    - internal/db/sqlc
  max-issues-per-linter: 50
  max-same-issues: 5
