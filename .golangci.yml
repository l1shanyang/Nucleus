run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gocritic
    - gofmt
    - goimports
    - misspell

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  goimports:
    local-prefixes: nucleus

issues:
  exclude-dirs:
    - vendor
    - internal/db/sqlc
  max-issues-per-linter: 50
  max-same-issues: 5
