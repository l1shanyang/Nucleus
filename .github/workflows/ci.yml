name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nucleus
          POSTGRES_USER: nucleus
          POSTGRES_PASSWORD: nucleus
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nucleus -d nucleus"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Load tool versions
        id: versions
        shell: bash
        run: |
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" == \#* ]] && continue
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < versions.env

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.versions.outputs.GO_VERSION }}
          cache: true

      - name: Version check
        run: make version-check

      - name: Format
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          DATABASE_URL: postgres://nucleus:nucleus@localhost:5432/nucleus?sslmode=disable
        run: go test -v -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/api

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@${{ steps.versions.outputs.GOVULNCHECK_VERSION }} ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load tool versions
        id: versions
        shell: bash
        run: |
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" == \#* ]] && continue
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < versions.env

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.versions.outputs.GO_VERSION }}
          cache: true

      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ steps.versions.outputs.GOLANGCI_LINT_VERSION }} run
