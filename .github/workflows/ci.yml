name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nucleus
          POSTGRES_USER: nucleus
          POSTGRES_PASSWORD: nucleus
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U nucleus -d nucleus"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Format
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          DATABASE_URL: postgres://nucleus:nucleus@localhost:5432/nucleus?sslmode=disable
        run: go test -v -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/api

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
