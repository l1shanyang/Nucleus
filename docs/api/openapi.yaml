openapi: "3.0.3"
info:
  title: Nucleus API
  description: Nucleus 后端骨架 API
  version: "0.1.0"

servers:
  - url: http://localhost:8080
    description: 本地开发

paths:
  /healthz:
    get:
      summary: 存活探针
      tags: [运维]
      responses:
        "200":
          description: 进程存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readyz:
    get:
      summary: 就绪探针
      tags: [运维]
      responses:
        "200":
          description: 服务就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: 服务未就绪
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /api/v1/notes:
    post:
      summary: 创建笔记
      tags: [笔记]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteDataResponse"
        "400":
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: 查询笔记列表
      tags: [笔记]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: 每页条数
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: 偏移量
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteListResponse"

components:
  schemas:
    CreateNoteRequest:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          maxLength: 200
          example: "First Note"
        body:
          type: string
          example: "Hello Nucleus"

    Note:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: "First Note"
        body:
          type: string
          example: "Hello Nucleus"
        created_at:
          type: string
          format: date-time

    NoteDataResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Note"

    NoteListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Note"
        meta:
          type: object
          properties:
            limit:
              type: integer
            offset:
              type: integer

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, not_ready]
        database:
          type: string
          enum: [ok, unavailable]

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: BAD_REQUEST
            message:
              type: string
              example: "title is required"
